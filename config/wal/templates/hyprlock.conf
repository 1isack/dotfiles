background {{
    monitor =
    path = {wallpaper}
    blur_passes = 2
    blur_size = 6
    noise = 0.02
    contrast = 0.9
    brightness = 0.8
}}

input-field {{
    monitor =
    size = 250, 60
    outline_thickness = 2
    outer_color = rgba({color4.strip}ee)
    inner_color = rgba({background.strip}cc)
    font_color = rgba({foreground.strip}ff)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}}

label {{
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba({foreground.strip}ff)
    font_size = 64
    font_family = GeistMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
}}

label {{
    monitor =
    text = cmd[update:60000] echo "$(LC_TIME=en_US.UTF-8 date +"%A, %d %B")"
    color = rgba({color4.strip}ff)
    font_size = 18
    font_family = GeistMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
}}

label {{
    monitor =
    text = cmd[update:100] /home/isaak/.local/bin/cava-bars.sh
    color = rgba({color4.strip}ff)
    font_size = 22
    font_family = GeistMono Nerd Font
    position = 0, -200
    halign = center
    valign = center
}}

label {{
    monitor =
    text = cmd[update:2000] /home/isaak/.local/bin/now-playing.sh
    color = rgba({foreground.strip}ff)
    font_size = 16
    font_family = GeistMono Nerd Font
    position = 0, -160
    halign = center
    valign = center
}}
