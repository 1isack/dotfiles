# BEGIN PYWAL THEME
themes:
  - name: "Pywal"
    base: "Tinted Dark"
    background: "{background}"
    foreground: "{foreground}"
    foreground_secondary: "{color7}"
    foreground_dim: "{color8}"
    foreground_disabled: "{color8}"
    section_title: "{color4}"
    accent: "{color4}"
    border: "{color8}"
    border_focused: "{color4}"
    selected_active_background: "{color4}"
    selected_active_foreground: "{background}"
    selected_inactive_background: "{color0}"
    selected_inactive_foreground: "{foreground}"
    scrollbar_thumb: "{color4}"
    scrollbar_track: "{color0}"
    progress_fill: "{color4}"
    progress_track: "{color0}"
    tab_active_foreground: "{color4}"
    tab_inactive_foreground: "{color8}"
    album_header_background: "{color0}"
    album_header_foreground: "{foreground}"
# END PYWAL THEME
